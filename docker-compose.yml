version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://climatepulse:climatepulse@db:5432/climatepulse
      MODEL_DIR: /app/models
      LOG_LEVEL: INFO
      RATE_LIMIT_PER_MINUTE: "200"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - model_data:/app/models
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: climatepulse
      POSTGRES_PASSWORD: climatepulse
      POSTGRES_DB: climatepulse
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climatepulse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  model_data:
