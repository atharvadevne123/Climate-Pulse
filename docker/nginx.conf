upstream climate_pulse {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 1m;

    location /api/ {
        proxy_pass http://climate_pulse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location /docs {
        proxy_pass http://climate_pulse/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://climate_pulse/openapi.json;
        proxy_set_header Host $host;
    }

    location /health {
        access_log off;
        proxy_pass http://climate_pulse/api/v1/health;
    }
}
